<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG FOOT | Sightings</title>
    <meta name="description" content="3,797 bigfoot sightings as footprints across North America.">

    <!-- Open Graph -->
    <meta property="og:title" content="Big Foot">
    <meta property="og:description" content="3,797 bigfoot sightings as footprints">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dr.eamer.dev/datavis/poems/bigfoot/big-foot.html">
    <meta property="og:image" content="https://dr.eamer.dev/datavis/poems/bigfoot/big-foot-social.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Big Foot">
    <meta name="twitter:description" content="3,797 bigfoot sightings as footprints">
    <meta name="twitter:image" content="https://dr.eamer.dev/datavis/poems/bigfoot/big-foot-social.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0908;
            font-family: 'JetBrains Mono', monospace;
        }

        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #viz {
            width: 100%;
            height: 100%;
            transform: rotate(-5deg);
            transform-origin: center center;
            cursor: grab;
        }

        #viz:active {
            cursor: grabbing;
        }

        .footprint {
            cursor: pointer;
        }

        .title {
            position: fixed;
            bottom: 24px;
            right: 28px;
            z-index: 100;
        }

        .title h1 {
            font-size: 32px;
            color: #c9a66b;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(201, 166, 107, 0.5);
        }

        #tooltip {
            position: fixed;
            background: rgba(15, 12, 10, 0.95);
            border: 1px solid rgba(201, 166, 107, 0.4);
            padding: 14px 18px;
            color: #fff;
            font-size: 11px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            min-width: 220px;
            max-width: 320px;
        }

        #tooltip.visible {
            opacity: 1;
        }

        .t-title {
            font-weight: 600;
            color: #e8c078;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #3d3530;
            padding-bottom: 4px;
            font-family: 'Inter', sans-serif;
            line-height: 1.4;
        }

        .t-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            color: #a89080;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
        }

        .t-val {
            color: #f0e6d8;
            font-weight: 600;
        }

        .t-class {
            display: inline-block;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-size: 0.65rem;
            margin-top: 0.5rem;
        }

        .t-class.class-a { background: rgba(144, 238, 144, 0.3); color: #90ee90; }
        .t-class.class-b { background: rgba(34, 139, 34, 0.3); color: #228b22; }
        .t-class.class-c { background: rgba(32, 178, 170, 0.3); color: #20b2aa; }

        /* Reveal elements */
        .reveal-element {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            z-index: 50;
        }

        .reveal-element.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .question-text {
            position: fixed;
            top: 24px;
            left: 28px;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            color: #3d3025;
            max-width: 300px;
            transition: opacity 0.8s ease, color 0.8s ease;
        }

        .question-text.visible {
            color: #e8dcc8;
        }

        .question-text .line-1 {
            font-weight: 300;
            margin-bottom: 4px;
        }

        .question-text .line-2 {
            font-weight: 600;
        }

        .axis-key {
            position: fixed;
            top: 90px;
            left: 28px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #3d3025;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: opacity 0.8s ease, color 0.8s ease;
        }

        .axis-key.visible {
            color: #b8a890;
        }

        .axis-key .key-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .axis-key .foot-icon {
            width: 12px;
            height: 18px;
            border-radius: 40% 40% 45% 45%;
        }

        .footer-links {
            position: fixed;
            bottom: 24px;
            left: 28px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-links a {
            color: #5a4a3a;
            text-decoration: none;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #e8c078;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0908;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #c9a66b;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .loading-dots {
            display: flex;
            gap: 8px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: #c9a66b;
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .question-text {
                top: 12px;
                left: 12px;
                font-size: 13px;
                max-width: 180px;
            }

            .axis-key {
                top: 60px;
                left: 12px;
                font-size: 10px;
            }

            .footer-links {
                bottom: 12px;
                left: 12px;
            }

            .title {
                bottom: 12px;
                right: 12px;
            }

            .title h1 {
                font-size: 18px;
                letter-spacing: 2px;
            }

            #tooltip {
                font-size: 10px;
                min-width: 180px;
                max-width: 280px;
                padding: 10px 14px;
            }

            .t-title {
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .question-text {
                top: 8px;
                left: 8px;
                font-size: 12px;
            }

            .axis-key {
                top: 50px;
                left: 8px;
                font-size: 9px;
            }

            .footer-links {
                bottom: 8px;
                left: 8px;
            }

            .title {
                bottom: 8px;
                right: 8px;
            }

            .title h1 {
                font-size: 16px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .reveal-element {
                opacity: 1;
                pointer-events: auto;
            }
        }
    </style>
</head>

<body>
    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-text">Finding footprints</div>
        <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>

    <!-- Question -->
    <div class="question-text reveal-element" id="question-text">
        <div class="line-1">Who left these prints</div>
        <div class="line-2">in the forest?</div>
    </div>

    <!-- Legend -->
    <div class="axis-key reveal-element" id="axis-key">
        <div class="key-item"><span class="foot-icon" style="background: #90ee90;"></span><span>visual encounters</span></div>
        <div class="key-item"><span class="foot-icon" style="background: #228b22;"></span><span>indirect evidence</span></div>
        <div class="key-item"><span class="foot-icon" style="background: #20b2aa;"></span><span>second-hand reports</span></div>
    </div>

    <!-- Footer -->
    <div class="footer-links reveal-element" id="footer-links">
        <a href="big-feet.html">view trails</a>
        <a href="https://dr.eamer.dev/datavis/poems/" target="_blank">more poems</a>
    </div>

    <div class="title">
        <h1>BIG FOOT</h1>
    </div>

    <div id="container">
        <svg id="viz"></svg>
    </div>

    <div id="tooltip"></div>

    <script>
        const loading = document.getElementById('loading');
        const tooltip = d3.select('#tooltip');
        const revealElements = document.querySelectorAll('.reveal-element');
        const titleArea = document.querySelector('.title');

        let isUILocked = false;
        let hideTimeout = null;

        const colors = {
            'Class A': '#90ee90',  // Light green (visual encounters)
            'Class B': '#228b22',  // Forest green (indirect evidence)
            'Class C': '#20b2aa'   // Teal (second-hand reports)
        };

        function showRevealElements() {
            if (hideTimeout) clearTimeout(hideTimeout);
            revealElements.forEach(el => el.classList.add('visible'));
        }

        function hideRevealElements() {
            if (!isUILocked) {
                hideTimeout = setTimeout(() => {
                    revealElements.forEach(el => el.classList.remove('visible'));
                }, 2000);
            }
        }

        revealElements.forEach(el => {
            el.addEventListener('mouseenter', showRevealElements);
            el.addEventListener('mouseleave', hideRevealElements);
        });
        titleArea.addEventListener('mouseenter', showRevealElements);
        titleArea.addEventListener('mouseleave', hideRevealElements);

        document.body.addEventListener('click', (e) => {
            if (e.target.closest('.footer-links') || e.target.closest('#tooltip')) return;
            isUILocked = !isUILocked;
            if (isUILocked) showRevealElements();
            else hideRevealElements();
        });

        // Smart tooltip positioning - shows above on mobile
        function positionTooltip(event) {
            const tooltipEl = tooltip.node();
            const tooltipRect = tooltipEl.getBoundingClientRect();
            const isMobile = window.innerWidth <= 768;

            let left, top;

            if (isMobile) {
                // On mobile, position above the cursor
                top = event.clientY - tooltipRect.height - 20;
                left = event.clientX - tooltipRect.width / 2;

                // Keep tooltip in viewport horizontally
                left = Math.max(10, Math.min(left, window.innerWidth - tooltipRect.width - 10));

                // If would go off top, position below instead
                if (top < 10) {
                    top = event.clientY + 20;
                }
            } else {
                // Desktop: position to the right
                left = event.pageX + 15;
                top = event.pageY - 15;

                // Bounds checking for desktop
                if (left + tooltipRect.width > window.innerWidth - 10) {
                    left = event.pageX - tooltipRect.width - 15;
                }
                if (top + tooltipRect.height > window.innerHeight - 10) {
                    top = event.pageY - tooltipRect.height - 15;
                }
                if (top < 10) {
                    top = 10;
                }
            }

            tooltip
                .style('left', left + 'px')
                .style('top', top + 'px');
        }

        // Footprint path
        function createFootprintPath(size) {
            const w = size * 0.6;
            const h = size;
            return `
                M 0,${-h/2}
                Q ${w/2},${-h/3} ${w/2},0
                Q ${w/2},${h/3} 0,${h/2}
                Q ${-w/2},${h/3} ${-w/2},0
                Q ${-w/2},${-h/3} 0,${-h/2}
                Z
            `;
        }

        // Load and render
        async function init() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            const svg = d3.select('#viz')
                .attr('width', width)
                .attr('height', height);

            // Create a group for zoomable content
            const zoomGroup = svg.append('g').attr('class', 'zoom-group');

            // Setup zoom - min scale 1 (current view), max scale 5
            const zoom = d3.zoom()
                .scaleExtent([1, 5])
                .on('zoom', (event) => {
                    zoomGroup.attr('transform', event.transform);
                });

            svg.call(zoom);

            try {
                const data = await d3.json('data/bigfoot.json');

                // Projection
                // Symmetric/centered padding
                const pad = width < 480 ? 40 : width < 768 ? 60 : 80;
                const padLeft = pad;
                const padRight = pad;
                const padTop = pad;
                const padBottom = pad;

                const projection = d3.geoAlbersUsa()
                    .fitExtent(
                        [[padLeft, padTop], [width - padRight, height - padBottom]],
                        {
                            type: "FeatureCollection",
                            features: data.map(d => ({
                                type: "Feature",
                                geometry: { type: "Point", coordinates: [d.lon, d.lat] }
                            }))
                        }
                    );

                // Size by year - smaller to match trails
                const yearExtent = d3.extent(data, d => d.year || 2000);
                const sizeScale = d3.scaleLinear()
                    .domain(yearExtent)
                    .range([6, 4]);

                // Prepare nodes
                const nodes = data.map(d => {
                    const projected = projection([d.lon, d.lat]);
                    if (!projected) return null;
                    return {
                        ...d,
                        x: projected[0],
                        y: projected[1],
                        size: sizeScale(d.year || 2000),
                        color: colors[d.classification] || '#8b6914'
                    };
                }).filter(n => n !== null);

                // Force simulation - tighter packing to match trails
                const simulation = d3.forceSimulation(nodes)
                    .force('x', d3.forceX(d => d.x).strength(0.5))
                    .force('y', d3.forceY(d => d.y).strength(0.5))
                    .force('collide', d3.forceCollide(d => d.size * 0.3 + 0.5))
                    .stop();

                for (let i = 0; i < 200; ++i) simulation.tick();

                // Draw footprints
                const footprints = zoomGroup.selectAll('.footprint')
                    .data(nodes)
                    .join('path')
                    .attr('class', 'footprint')
                    .attr('d', d => createFootprintPath(d.size))
                    .attr('transform', d => `translate(${d.x}, ${d.y}) rotate(${Math.random() * 20 - 10})`)
                    .attr('fill', d => d.color)
                    .attr('opacity', 0)
                    .on('mouseenter', function(event, d) {
                        d3.select(this).attr('opacity', 1);
                        showRevealElements();

                        const classType = (d.classification || '').toLowerCase().replace(' ', '-');
                        const classLabel = {
                            'Class A': 'Visual Encounter',
                            'Class B': 'Indirect Evidence',
                            'Class C': 'Second-hand Report'
                        };

                        tooltip
                            .html(`
                                <div class="t-title">${d.title || 'Unknown Sighting'}</div>
                                <div class="t-row"><span>Year</span><span class="t-val">${d.year || 'Unknown'}</span></div>
                                <div class="t-row"><span>Location</span><span class="t-val">${d.lat.toFixed(2)}°N, ${Math.abs(d.lon).toFixed(2)}°W</span></div>
                                <div class="t-class ${classType}">${classLabel[d.classification] || d.classification}</div>
                            `)
                            .classed('visible', true);

                        positionTooltip(event);
                    })
                    .on('mousemove', function(event) {
                        positionTooltip(event);
                    })
                    .on('mouseleave', function(event, d) {
                        d3.select(this).attr('opacity', 0.85);
                        tooltip.classed('visible', false);
                        hideRevealElements();
                    });

                // Animate in
                footprints
                    .transition()
                    .duration(800)
                    .delay((d, i) => i * 0.3)
                    .attr('opacity', 0.85);

                // Hide loading
                loading.classList.add('hidden');
                setTimeout(() => { loading.style.display = 'none'; }, 500);

            } catch (error) {
                console.error('Error loading data:', error);
                loading.querySelector('.loading-text').textContent = 'Error loading data';
            }
        }

        init();

        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
